<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />

<body>
  <div class="container">
    <header>
      <h1>語彙意味判断テスト</h1>
    </header>

    <main>
      <section class="stage">
        <p class="route-status">標準運用</p>
        <h2>Blueprint CATを開始</h2>
        <p class="stage-lead">
          全160項目のアイテムバンクから、回答状況に応じて項目を選びます。
          40問の最低出題数は設けず、推定精度に応じて停止します。
        </p>
        <ul class="note-list compact-list">
          <li>判断対象語のスペルは表示されません。音声を聞いて判断します。</li>
          <li>本試行では正誤フィードバックやスコアは表示されません。</li>
          <li>結果は終了時にExcelファイルとして保存されます。</li>
        </ul>
        <a class="primary-btn start-link" href="adaptive/">CAT版を開始する</a>
        <p class="mode-note">
          固定40問版は比較・バックアップ用です。必要な場合は研究者が
          <code>/fixed40/</code> のURLを直接指定します。
        </p>
      </section>
    </main>

    <footer>
      <small>語彙意味判断テスト</small>
    </footer>
  </div>
