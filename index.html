<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>語彙意味判断テスト (LJT)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="assets/styles.css?v=20260428i" />
</head>
<body>
  <div class="container">
    <header>
      <h1>語彙意味判断テスト</h1>
    </header>

    <main>
      <section class="stage">
        <p class="route-status">リスニング形式</p>
        <h2>テストを開始</h2>
        <p class="stage-lead">
          英語の短い文を聞き、聞こえた英単語の使い方が文脈に合っているかを判断します。
          本試行の問題数は回答状況に応じて変わります。
        </p>
        <ul class="note-list compact-list">
          <li>判断対象語のスペルは表示されません。音声を聞いて判断します。</li>
          <li>本試行では正誤フィードバックやスコアは表示されません。</li>
          <li>結果は終了時にExcelファイルとして保存されます。</li>
        </ul>
        <a class="primary-btn start-link" href="adaptive/">テストを開始する</a>
        <p class="mode-note">
          研究者から別のURLを指定されている場合は、そのURLを使用してください。
        </p>
      </section>
    </main>

    <footer>
      <small>語彙意味判断テスト</small>
    </footer>
  </div>
</body>
</html>
